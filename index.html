<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 문법 학습 (개별 확인 & 자유 제출)</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f0f2f5;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; width: 100%; max-width: 800px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 3px solid var(--primary); padding-bottom: 15px; margin-bottom: 30px; }
        
        .quiz-item { margin-bottom: 35px; padding: 25px; border: 1px solid #e1e8ed; border-radius: 15px; background: #fff; transition: 0.3s; }
        .quiz-item.solved { border-color: var(--success); background-color: #f0fff4; }
        .translation { display: block; margin-bottom: 10px; color: #2c3e50; font-weight: 700; background: #fff9db; padding: 12px; border-radius: 8px; font-size: 1rem; }
        .sentence-context { color: #555; margin-bottom: 15px; font-size: 1.05rem; line-height: 1.6; }
        
        /* 단어 배열 */
        .word-pool { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; padding: 15px; background: #f8f9fa; border: 2px dashed #cbd5e0; border-radius: 10px; }
        .word { background: white; border: 1px solid #cbd5e0; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .word.used { opacity: 0.2; pointer-events: none; }
        .answer-area { display: flex; flex-wrap: wrap; gap: 10px; min-height: 55px; padding: 10px; border-bottom: 3px solid var(--primary); margin-bottom: 15px; background: #fdfdfd; }
        .ans-word { background: var(--primary); color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; }

        /* 선택형 */
        .choice-container { display: flex; gap: 15px; margin-top: 15px; }
        .choice-btn { flex: 1; padding: 12px; border: 2px solid #e2e8f0; background: white; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: 0.2s; }
        .choice-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* 피드백 메시지 */
        .feedback-msg { margin-top: 15px; font-weight: bold; display: none; font-size: 0.9rem; }
        .feedback-msg.correct { color: var(--success); display: block; }
        .feedback-msg.wrong { color: var(--danger); display: block; }

        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .check-btn { padding: 10px 20px; border-radius: 8px; border: none; background: #34495e; color: white; cursor: pointer; font-weight: bold; }
        .check-btn:disabled { background: #cbd5e0; cursor: default; }

        .submit-btn { width: 100%; padding: 25px; background: #2c3e50; color: white; border: none; border-radius: 12px; font-size: 1.3rem; font-weight: bold; cursor: pointer; margin-top: 50px; }
        
        /* 결과 화면 */
        #result-screen { display: none; }
        .score-box { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .score-text { font-size: 4rem; font-weight: 900; color: var(--primary); }
        .review-card { margin-bottom: 20px; padding: 20px; border-left: 6px solid var(--danger); background: #fff5f5; border-radius: 8px; text-align: left; }
        .correct-answer { color: var(--success); font-weight: bold; display: block; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container" id="quiz-ui">
    <h1>📝 Grammar Test & Feedback</h1>
    <p style="text-align: center; color: #666;">문제별로 정답을 확인하거나, 다 푼 뒤 아래 버튼으로 제출하세요.</p>
    
    <div id="quiz-container"></div>

    <button class="submit-btn" onclick="processResult()">학습 종료 및 최종 제출</button>
</div>

<div class="container" id="result-screen">
    <div class="score-box">
        <h1>Final Score</h1>
        <div class="score-text" id="final-score">0 / 10</div>
        <p>캡처 후 오답 노트를 확인하세요!</p>
    </div>
    <div id="wrong-summary"></div>
    <div style="text-align:center; margin-top:30px;">
        <button class="submit-btn" style="background:var(--success);" onclick="window.location.reload()">처음부터 다시 풀기</button>
    </div>
</div>

<script>
const allData = [
    { type: 'arr', translation: "우리가 환경 문제를 더 잘 인식할수록, 자연을 보호하려고 더 노력하게 된다.", context: "<u>(배열)</u> of environmental issues, the more we try to protect nature.", words: ["the", "more", "aware", "we", "are"], correct: "the more aware we are", full: "<strong>The more aware we are</strong> of environmental issues, the more we try to protect nature." },
    { type: 'arr', translation: "당신이 더 건강할수록, 일상 활동을 위한 에너지를 더 많이 갖게 될 것이다.", context: "<u>(배열)</u>, the more energy you will have for daily activities.", words: ["the", "more", "healthy", "you", "are"], correct: "the more healthy you are", full: "<strong>The more healthy you are</strong>, the more energy you will have for daily activities." },
    { type: 'arr', translation: "학생들이 더 자신감이 있을수록, 더 자연스럽게 의사소통할 수 있다.", context: "<u>(배열)</u>, the more naturally they can communicate.", words: ["the", "more", "confident", "students", "are"], correct: "the more confident students are", full: "<strong>The more confident students are</strong>, the more naturally they can communicate." },
    { type: 'arr', translation: "사람들이 더 고립될수록, 실제 친구를 사귀는 것은 더 어려워진다.", context: "<u>(배열)</u>, the harder it is for them to make real-life friends.", words: ["the", "more", "isolated", "people", "are"], correct: "the more isolated people are", full: "<strong>The more isolated people are</strong>, the harder it is for them to make real-life friends." },
    { type: 'arr', translation: "당신의 생각이 더 창의적일수록, 더 독특한 해결책을 찾을 수 있다.", context: "<u>(배열)</u>, the more unique solutions you can find.", words: ["the", "more", "creative", "your", "ideas", "are"], correct: "the more creative your ideas are", full: "<strong>The more creative your ideas are</strong>, the more unique solutions you can find." },
    { type: 'choice', translation: "연구원들은 수천 년 전 사람들이 어떻게 살았는지 보여주는 고대 유물을 발견했다.", sentence: "Artifacts that [reveal / reveals] how people lived thousands of years ago.", choices: ["reveal", "reveals"], correct: "reveal", full: "Artifacts that <strong>reveal</strong> how people lived..." },
    { type: 'choice', translation: "자선 행사에 참여하기를 원하는 사람은 누구든 이번 주 금요일까지 신청해야 한다.", sentence: "Anyone who [want / wants] to participate in the charity event...", choices: ["want", "wants"], correct: "wants", full: "Anyone who <strong>wants</strong> to participate..." },
    { type: 'choice', translation: "도서관에는 기말고사를 준비하고 있는 많은 학생들이 있다.", sentence: "Many students in the library who [is / are] preparing...", choices: ["is", "are"], correct: "are", full: "Many students... who <strong>are</strong> preparing..." },
    { type: 'choice', translation: "유기농 토양 채소는 면역 체계를 강화하는 데 도움을 주는 비타민을 함유한다.", sentence: "Vitamins that [help / helps] boost the immune system.", choices: ["help", "helps"], correct: "help", full: "Vitamins that <strong>help</strong> boost..." },
    { type: 'choice', translation: "그 앱은 모든 체력 수준에 맞는 운동들을 포함하는 운동 계획을 제공한다.", sentence: "A workout plan that [includes / include] exercises...", choices: ["includes", "include"], correct: "includes", full: "A plan... that <strong>includes</strong> exercises..." }
];

const container = document.getElementById('quiz-container');
let solvedStatus = new Array(allData.length).fill(false);

allData.forEach((q, idx) => {
    const item = document.createElement('div');
    item.className = 'quiz-item';
    item.id = `item-${idx}`;
    item.innerHTML = `<span class="translation">Q${idx+1}. ${q.translation}</span>`;
    
    if(q.type === 'arr') {
        const shuffled = [...q.words].sort(() => Math.random() - 0.5);
        item.innerHTML += `
            <div class="sentence-context">${q.context}</div>
            <div class="answer-area" id="ans-${idx}"></div>
            <div class="word-pool">${shuffled.map(w => `<span class="word" onclick="pickWord(this, ${idx})">${w}</span>`).join('')}</div>
        `;
    } else {
        item.innerHTML += `
            <div class="sentence-context" style="background:#f1f3f5; padding:10px; border-radius:5px;">${q.sentence}</div>
            <div class="choice-container" id="choice-${idx}">
                ${q.choices.map(c => `<button class="choice-btn" onclick="selectChoice(this, ${idx})">${c}</button>`).join('')}
            </div>
        `;
    }
    item.innerHTML += `
        <div id="feedback-${idx}" class="feedback-msg"></div>
        <div class="btn-row"><button id="chk-btn-${idx}" class="check-btn" onclick="checkSingle(${idx})">정답 확인</button></div>
    `;
    container.appendChild(item);
});

function pickWord(el, idx) {
    if(solvedStatus[idx]) return;
    const area = document.getElementById(`ans-${idx}`);
    const w = document.createElement('span');
    w.className = 'ans-word';
    w.innerText = el.innerText;
    w.onclick = () => { if(!solvedStatus[idx]) { w.remove(); el.classList.remove('used'); } };
    area.appendChild(w);
    el.classList.add('used');
}

function selectChoice(btn, idx) {
    if(solvedStatus[idx]) return;
    Array.from(btn.parentElement.children).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

function checkSingle(idx) {
    const q = allData[idx];
    const feedback = document.getElementById(`feedback-${idx}`);
    let userVal = "";
    if(q.type === 'arr') userVal = Array.from(document.getElementById(`ans-${idx}`).children).map(c => c.innerText.trim()).join(' ').toLowerCase();
    else {
        const sel = document.querySelector(`#choice-${idx} .selected`);
        userVal = sel ? sel.innerText.trim().toLowerCase() : "";
    }

    if(userVal === q.correct.toLowerCase()) {
        feedback.innerText = "✅ 정답입니다!";
        feedback.className = "feedback-msg correct";
        document.getElementById(`item-${idx}`).classList.add('solved');
        document.getElementById(`chk-btn-${idx}`).disabled = true;
        solvedStatus[idx] = true;
    } else {
        feedback.innerText = "❌ 틀렸습니다. 다시 시도해 보세요.";
        feedback.className = "feedback-msg wrong";
    }
}

function processResult() {
    let score = 0;
    const summary = document.getElementById('wrong-summary');
    summary.innerHTML = "<h3>🔍 오답 노트 (다시 공부하기)</h3>";

    allData.forEach((q, idx) => {
        let userVal = "";
        if(q.type === 'arr') userVal = Array.from(document.getElementById(`ans-${idx}`).children).map(c => c.innerText.trim()).join(' ').toLowerCase();
        else {
            const sel = document.querySelector(`#choice-${idx} .selected`);
            userVal = sel ? sel.innerText.trim().toLowerCase() : "";
        }

        if(userVal === q.correct.toLowerCase()) score++;
        else {
            const div = document.createElement('div');
            div.className = 'review-card';
            div.innerHTML = `<strong>[Q${idx+1}] ${q.translation}</strong><br>내 제출: <span style="color:var(--danger);">${userVal || "(빈칸)"}</span><br><span class="correct-answer">정답: ${q.full}</span>`;
            summary.appendChild(div);
        }
    });

    document.getElementById('quiz-ui').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').innerText = `${score} / 10`;
    window.scrollTo(0,0);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The + 비교급 완벽 마스터</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f8f9fa;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 700px; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .quiz-item { margin-bottom: 30px; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .translation { background: #fff9db; padding: 8px; border-radius: 5px; font-size: 0.9em; margin-bottom: 10px; display: block; }
        .word-pool { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; min-height: 40px; padding: 10px; background: #f1f3f5; border-radius: 8px; }
        .word { background: white; border: 1px solid #dee2e6; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .word.used { opacity: 0.3; pointer-events: none; }
        .answer-area { display: flex; flex-wrap: wrap; gap: 8px; min-height: 45px; padding: 10px; border-bottom: 2px solid var(--primary); margin-bottom: 10px; }
        .ans-word { background: var(--primary); color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .submit-btn { width: 100%; padding: 15px; background: #333; color: white; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
        
        /* 결과 화면 스타일 */
        #result-screen { display: none; padding: 20px; border: 2px solid #333; border-radius: 15px; background: white; margin-top: 20px; }
        .score-badge { font-size: 2em; text-align: center; margin: 20px 0; color: var(--primary); font-weight: bold; }
        .review-item { margin-bottom: 15px; padding: 10px; border-left: 4px solid var(--danger); background: #fff5f5; }
        .correct-text { color: var(--success); font-weight: bold; }
        .wrong-text { color: var(--danger); text-decoration: line-through; margin-right: 10px; }
        .capture-guide { text-align: center; color: #888; font-size: 0.8em; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <h1>The + 비교급 어순 배열</h1>
    <div id="quiz-list"></div>
    <button class="submit-btn" onclick="showTotalResult()">학습 종료 및 결과 보기</button>

    <div id="result-screen">
        <h2 style="text-align:center;">🎉 학습 결과 리포트</h2>
        <div class="score-badge" id="final-score">0 / 0</div>
        <div id="wrong-answers-list"></div>
        <p class="capture-guide">💡 이 화면을 캡처하여 제출하세요!</p>
        <button class="submit-btn" style="background:var(--success);" onclick="window.location.reload()">다시 풀기</button>
    </div>
</div>

<script>
const quizData = [
    { topic: "1. 환경 문제 인식", translation: "우리가 환경 문제를 더 잘 인식할수록, 자연을 보호하려고 더 노력하게 된다.", words: ["the", "more", "aware", "we", "are"], answer: "the more aware we are" },
    { topic: "2. 건강과 에너지", translation: "당신이 더 건강할수록, 일상 활동을 위한 에너지를 더 많이 갖게 될 것이다.", words: ["the", "more", "healthy", "you", "are"], answer: "the more healthy you are" },
    { topic: "3. 자신감과 소통", translation: "학생들이 더 자신감이 있을수록, 더 자연스럽게 의사소통할 수 있다.", words: ["the", "more", "confident", "students", "are"], answer: "the more confident students are" },
    { topic: "4. 고립과 교우관계", translation: "사람들이 더 고립될수록, 실제 친구를 사귀는 것은 더 어려워진다.", words: ["the", "more", "isolated", "people", "are"], answer: "the more isolated people are" },
    { topic: "5. 창의성과 해결책", translation: "당신의 생각이 더 창의적일수록, 더 독특한 해결책을 찾을 수 있다.", words: ["the", "more", "creative", "your", "ideas", "are"], answer: "the more creative your ideas are" }
];

const quizList = document.getElementById('quiz-list');

quizData.forEach((q, idx) => {
    const div = document.createElement('div');
    div.className = 'quiz-item';
    const shuffled = [...q.words].sort(() => Math.random() - 0.5);
    
    div.innerHTML = `
        <strong style="display:block; margin-bottom:5px;">${q.topic}</strong>
        <span class="translation">뜻: ${q.translation}</span>
        <div class="word-pool" id="pool-${idx}">
            ${shuffled.map(w => `<span class="word" onclick="pick(this, ${idx})">${w}</span>`).join('')}
        </div>
        <div class="answer-area" id="ans-${idx}"></div>
    `;
    quizList.appendChild(div);
});

function pick(el, idx) {
    const ansArea = document.getElementById(`ans-${idx}`);
    const word = document.createElement('span');
    word.className = 'ans-word';
    word.innerText = el.innerText;
    word.onclick = () => { word.remove(); el.classList.remove('used'); };
    ansArea.appendChild(word);
    el.classList.add('used');
}

function showTotalResult() {
    let score = 0;
    const wrongList = document.getElementById('wrong-answers-list');
    wrongList.innerHTML = "<h3>📝 오답 노트</h3>";
    
    quizData.forEach((q, idx) => {
        const userAns = Array.from(document.getElementById(`ans-${idx}`).children).map(c => c.innerText).join(' ').toLowerCase();
        if(userAns === q.answer.toLowerCase()) {
            score++;
        } else {
            const item = document.createElement('div');
            item.className = 'review-item';
            item.innerHTML = `
                <div style="font-weight:bold; margin-bottom:5px;">${q.topic}</div>
                <div><span class="wrong-text">${userAns || "(빈칸)"}</span></div>
                <div>정답: <span class="correct-text">${q.answer}</span></div>
            `;
            wrongList.appendChild(item);
        }
    });

    if(score === quizData.length) {
        wrongList.innerHTML += "<p style='text-align:center;'>모든 문제를 맞혔습니다! 완벽해요! 👏</p>";
    }

    document.getElementById('quiz-list').style.display = 'none';
    document.querySelector('.submit-btn').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
    
    // 화면 상단으로 이동하여 캡처 준비
    window.scrollTo(0, 0);
}
</script>
</body>
</html>
